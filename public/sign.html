<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חתימה דיגיטלית</title>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f1f5f9; color: #1e293b; }
  .header { background: #2563eb; color: white; padding: 16px 24px; text-align: center; }
  .header h1 { font-size: 20px; }
  .header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
  .content { max-width: 860px; margin: 24px auto; padding: 0 16px 40px; }
  .panel { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .badge { background: #dbeafe; color: #1d4ed8; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; display: inline-block; margin-bottom: 12px; }

  /* PDF canvas container */
  #pdf-container { position: relative; width: 100%; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; background: #fff; }
  #pdf-canvas    { display: block; width: 100%; }

  /* Field marker overlay — positioned over the signature field */
  #field-marker {
    position: absolute; pointer-events: none; display: none;
    border: 2.5px dashed #2563eb;
    background: rgba(37,99,235,0.07);
    border-radius: 3px;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
  }
  #field-marker-label {
    position: absolute; top: -22px; right: 0;
    background: #2563eb; color: white;
    font-size: 10px; font-weight: bold;
    padding: 2px 8px; border-radius: 3px;
    white-space: nowrap;
  }

  /* Page navigation */
  #page-nav { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 10px; font-size: 13px; color: #64748b; }
  #page-nav button { background: #e2e8f0; border: none; padding: 4px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  #page-nav button:disabled { opacity: 0.4; cursor: default; }

  .sig-area { border: 2px solid #cbd5e1; border-radius: 8px; background: white; touch-action: none; margin-top: 12px; }
  #signature-canvas { display: block; width: 100%; height: 180px; }
  .sig-actions { display: flex; gap: 8px; margin-top: 8px; }
  .btn { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
  .btn:disabled { background: #94a3b8; cursor: not-allowed; }
  .btn-outline { background: white; color: #64748b; border: 1px solid #cbd5e1; }
  .btn-green { background: #16a34a; }
  .loading { text-align: center; padding: 40px; }
  .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success-screen { text-align: center; padding: 60px 24px; }
  .success-screen .icon { font-size: 72px; margin-bottom: 16px; }
  .error-screen { text-align: center; padding: 60px 24px; }
  .hidden { display: none !important; }
  .hint { color: #64748b; font-size: 13px; margin-top: 4px; }
  .agree-row { display: flex; align-items: center; gap: 10px; margin-top: 16px; font-size: 14px; cursor: pointer; }
  .agree-row input { width: 18px; height: 18px; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <h1>📄 חתימה דיגיטלית</h1>
  <p id="header-sub">טוען מסמך...</p>
</div>

<div class="content">
  <div class="loading" id="loading-screen">
    <div class="spinner"></div>
    <p>טוען מסמך...</p>
  </div>

  <div class="error-screen hidden" id="error-screen">
    <div style="font-size:64px">⚠️</div>
    <h2 id="error-title">שגיאה</h2>
    <p id="error-msg"></p>
  </div>

  <div class="hidden" id="main-screen">
    <div class="panel">
      <span class="badge" id="signer-badge">חותם</span>
      <p style="color:#64748b;font-size:14px;margin-bottom:16px">עיין במסמך — האזור המסומן הוא מקום החתימה שלך</p>

      <!-- PDF rendered via pdf.js — field marker overlaid directly on the PDF -->
      <div id="pdf-container">
        <canvas id="pdf-canvas"></canvas>
        <div id="field-marker">
          <div id="field-marker-label">✍️ החתימה שלך כאן</div>
        </div>
      </div>

      <!-- Page navigation (shown only for multi-page PDFs) -->
      <div id="page-nav" style="display:none">
        <button id="btn-prev" onclick="changePage(-1)">◀ הקודם</button>
        <span id="page-info">עמוד 1</span>
        <button id="btn-next" onclick="changePage(1)">הבא ▶</button>
      </div>
    </div>

    <div class="panel">
      <h3 style="margin-bottom:8px">✍️ חתימתך</h3>
      <p class="hint">חתום בתיבה למטה באמצעות האצבע או עכבר</p>
      <div class="sig-area">
        <canvas id="signature-canvas"></canvas>
      </div>
      <div class="sig-actions">
        <button class="btn btn-outline" onclick="clearSig()">מחק חתימה</button>
      </div>
      <label class="agree-row">
        <input type="checkbox" id="agree-check">
        <span>קראתי את המסמך ומסכים/ה לחתום עליו דיגיטלית</span>
      </label>
      <button class="btn btn-green" style="margin-top:16px;width:100%;font-size:18px" id="submit-btn" onclick="submitSignature()">
        ✅ אשר חתימה ושלח
      </button>
      <p class="hint" style="text-align:center;margin-top:8px">החתימה נשמרת בצורה מאובטחת</p>
    </div>
  </div>

  <div class="success-screen hidden" id="success-screen">
    <div class="icon">✅</div>
    <h2>תודה! חתמת בהצלחה</h2>
    <p id="success-msg">החתימה שלך נשמרה.</p>
    <p style="margin-top:12px;color:#94a3b8;font-size:13px">ניתן לסגור חלון זה</p>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const token = new URLSearchParams(window.location.search).get('token');
  let sigPad   = null;
  let pdfDoc   = null;
  let totalPages = 1;
  let currentPage = 1;
  let sigField    = null;   // the signature field for this signer
  let pdfScale    = 1;

  async function init() {
    if (!token) { showError('לינק לא תקין', 'חסר קוד אימות בקישור'); return; }
    try {
      const r = await fetch(`/api/sign/info?token=${token}`);
      const data = await r.json();
      if (!r.ok) { showError('שגיאה', data.error); return; }

      document.getElementById('header-sub').textContent = `${data.docName} — ${data.signerName}`;
      document.getElementById('signer-badge').textContent = data.signerName;

      sigField = (data.fields && data.fields.length > 0) ? data.fields[0] : null;

      // Load PDF with pdf.js
      pdfDoc = await pdfjsLib.getDocument({
        url: `/api/sign/pdf-proxy?token=${token}`,
        cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
        cMapPacked: true,
      }).promise;

      totalPages = pdfDoc.numPages;

      // Start on the page containing the signature field
      currentPage = sigField ? (sigField.page + 1) : 1;

      await renderPage(currentPage);

      if (totalPages > 1) {
        document.getElementById('page-nav').style.display = 'flex';
        updatePageNav();
      }

      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('main-screen').classList.remove('hidden');
      initSigPad();

    } catch (e) {
      showError('שגיאה בטעינה', e.message);
    }
  }

  async function renderPage(pageNum) {
    const page  = await pdfDoc.getPage(pageNum);
    const vp0   = page.getViewport({ scale: 1 });
    const container = document.getElementById('pdf-container');
    const containerW = container.clientWidth || 820;
    pdfScale = containerW / vp0.width;
    const vp = page.getViewport({ scale: pdfScale });

    const canvas = document.getElementById('pdf-canvas');
    canvas.width  = vp.width;
    canvas.height = vp.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;

    // Show field marker if this page contains the signature field
    const marker = document.getElementById('field-marker');
    if (sigField && sigField.page === pageNum - 1) {
      marker.style.left   = (sigField.x      * pdfScale) + 'px';
      marker.style.top    = (sigField.y      * pdfScale) + 'px';
      marker.style.width  = (sigField.width  * pdfScale) + 'px';
      marker.style.height = (sigField.height * pdfScale) + 'px';
      marker.style.display = 'block';

      // Scroll marker into view after a short delay
      setTimeout(() => {
        marker.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 300);
    } else {
      marker.style.display = 'none';
    }
  }

  async function changePage(dir) {
    const next = currentPage + dir;
    if (next < 1 || next > totalPages) return;
    currentPage = next;
    await renderPage(currentPage);
    updatePageNav();
  }

  function updatePageNav() {
    document.getElementById('page-info').textContent = `עמוד ${currentPage} מתוך ${totalPages}`;
    document.getElementById('btn-prev').disabled = currentPage <= 1;
    document.getElementById('btn-next').disabled = currentPage >= totalPages;
  }

  function initSigPad() {
    const canvas = document.getElementById('signature-canvas');
    canvas.width = canvas.offsetWidth || 700;
    canvas.height = 180;
    sigPad = new SignaturePad(canvas, { backgroundColor: 'rgb(255,255,255)', penColor: '#1e293b' });
  }

  function clearSig() { sigPad.clear(); }

  async function submitSignature() {
    if (sigPad.isEmpty()) { alert('אנא חתום לפני האישור'); return; }
    if (!document.getElementById('agree-check').checked) { alert('יש לאשר את ההסכמה לפני החתימה'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'שולח...';

    try {
      const r = await fetch('/api/sign/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, signatureImage: sigPad.toDataURL('image/png') }),
      });
      const data = await r.json();
      if (!r.ok) { alert(data.error || 'שגיאה בשליחה'); btn.disabled = false; btn.textContent = '✅ אשר חתימה ושלח'; return; }

      document.getElementById('main-screen').classList.add('hidden');
      document.getElementById('success-screen').classList.remove('hidden');
      document.getElementById('success-msg').textContent = data.status === 'complete'
        ? 'כל החותמים השלימו — המסמך הסופי נוצר!'
        : 'החתימה שלך נשמרה בהצלחה!';
    } catch (e) {
      alert('שגיאה: ' + e.message);
      btn.disabled = false;
      btn.textContent = '✅ אשר חתימה ושלח';
    }
  }

  function showError(title, msg) {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('error-screen').classList.remove('hidden');
    document.getElementById('error-title').textContent = title;
    document.getElementById('error-msg').textContent = msg;
  }

  init();
</script>
</body>
</html>
