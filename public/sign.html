<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חתימה דיגיטלית</title>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f1f5f9; color: #1e293b; }
  .header { background: #2563eb; color: white; padding: 16px 24px; text-align: center; }
  .header h1 { font-size: 20px; }
  .header p  { font-size: 14px; opacity: 0.85; margin-top: 4px; }
  .content { max-width: 860px; margin: 24px auto; padding: 0 16px 40px; }
  .panel { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .badge { background: #dbeafe; color: #1d4ed8; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; display: inline-block; margin-bottom: 12px; }

  /* PDF container — iframe fills it, overlay sits on top */
  #pdf-wrap { position: relative; width: 100%; border: 1px solid #e2e8f0; border-radius: 6px; overflow: hidden; }
  #pdf-iframe { display: block; width: 100%; border: none; }

  /* Transparent overlay — pointer-events:none so clicks pass through to iframe */
  #field-overlay {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  .field-marker {
    position: absolute;
    border: 2.5px dashed #2563eb;
    background: rgba(37,99,235,0.07);
    border-radius: 3px;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.13);
  }
  .field-marker-label {
    position: absolute; bottom: 100%; right: 0; margin-bottom: 4px;
    background: #2563eb; color: white;
    font-size: 10px; font-weight: bold;
    padding: 2px 8px; border-radius: 3px;
    white-space: nowrap;
  }

  .sig-area { border: 2px solid #cbd5e1; border-radius: 8px; background: white; touch-action: none; margin-top: 12px; }
  #signature-canvas { display: block; width: 100%; height: 180px; }
  .sig-actions { display: flex; gap: 8px; margin-top: 8px; }
  .btn { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
  .btn:disabled { background: #94a3b8; cursor: not-allowed; }
  .btn-outline { background: white; color: #64748b; border: 1px solid #cbd5e1; }
  .btn-green { background: #16a34a; }
  .loading { text-align: center; padding: 40px; }
  .spinner { width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success-screen { text-align: center; padding: 60px 24px; }
  .success-screen .icon { font-size: 72px; margin-bottom: 16px; }
  .error-screen { text-align: center; padding: 60px 24px; }
  .hidden { display: none !important; }
  .hint { color: #64748b; font-size: 13px; margin-top: 4px; }
  .agree-row { display: flex; align-items: center; gap: 10px; margin-top: 16px; font-size: 14px; cursor: pointer; }
  .agree-row input { width: 18px; height: 18px; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <h1>📄 חתימה דיגיטלית</h1>
  <p id="header-sub">טוען מסמך...</p>
</div>

<div class="content">
  <div class="loading" id="loading-screen">
    <div class="spinner"></div>
    <p>טוען מסמך...</p>
  </div>

  <div class="error-screen hidden" id="error-screen">
    <div style="font-size:64px">⚠️</div>
    <h2 id="error-title">שגיאה</h2>
    <p id="error-msg"></p>
  </div>

  <div class="hidden" id="main-screen">
    <div class="panel">
      <span class="badge" id="signer-badge">חותם</span>
      <p style="color:#64748b;font-size:14px;margin-bottom:16px">עיין במסמך — האזור המסומן בכחול הוא מקום החתימה</p>

      <!-- iframe (native renderer — Hebrew works) + transparent overlay for field marker -->
      <div id="pdf-wrap">
        <iframe id="pdf-iframe" src=""></iframe>
        <div id="field-overlay">
          <!-- field markers injected dynamically by positionMarkers() -->
        </div>
      </div>
    </div>

    <div class="panel">
      <h3 style="margin-bottom:8px">✍️ חתימתך</h3>
      <p class="hint">חתום בתיבה למטה באמצעות האצבע או עכבר</p>
      <div class="sig-area">
        <canvas id="signature-canvas"></canvas>
      </div>
      <div class="sig-actions">
        <button class="btn btn-outline" onclick="clearSig()">מחק חתימה</button>
      </div>
      <label class="agree-row">
        <input type="checkbox" id="agree-check">
        <span>קראתי את המסמך ומסכים/ה לחתום עליו דיגיטלית</span>
      </label>
      <button class="btn btn-green" style="margin-top:16px;width:100%;font-size:18px" id="submit-btn" onclick="submitSignature()">
        ✅ אשר חתימה ושלח
      </button>
      <p class="hint" style="text-align:center;margin-top:8px">החתימה נשמרת בצורה מאובטחת</p>
    </div>
  </div>

  <div class="success-screen hidden" id="success-screen">
    <div class="icon">✅</div>
    <h2>תודה! חתמת בהצלחה</h2>
    <p id="success-msg">החתימה שלך נשמרה.</p>
    <p style="margin-top:12px;color:#94a3b8;font-size:13px">ניתן לסגור חלון זה</p>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const token = new URLSearchParams(window.location.search).get('token');
  let sigPad = null;

  async function init() {
    if (!token) { showError('לינק לא תקין', 'חסר קוד אימות בקישור'); return; }
    try {
      const r = await fetch(`/api/sign/info?token=${token}`);
      const data = await r.json();
      if (!r.ok) { showError('שגיאה', data.error); return; }

      document.getElementById('header-sub').textContent = `${data.docName} — ${data.signerName}`;
      document.getElementById('signer-badge').textContent = data.signerName;

      const fields = data.fields || [];

      // iframe — native renderer (Hebrew works perfectly)
      const iframe = document.getElementById('pdf-iframe');
      iframe.src = `/api/sign/pdf-proxy?token=${token}#toolbar=0&navpanes=0&scrollbar=0&zoom=page-width`;
      iframe.style.height = '400px'; // temporary until positionMarkers sets exact height

      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('main-screen').classList.remove('hidden');
      initSigPad();

      // Position ALL field markers
      if (fields.length > 0) positionMarkers(fields);

    } catch (e) {
      showError('שגיאה בטעינה', e.message);
    }
  }

  async function positionMarkers(fields) {
    try {
      // Load PDF silently — only for page dimensions (no canvas rendering)
      const pdf = await pdfjsLib.getDocument({
        url: `/api/sign/pdf-proxy?token=${token}`,
        cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
        cMapPacked: true,
      }).promise;

      const pageDims = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        const pg = await pdf.getPage(i);
        pageDims.push(pg.getViewport({ scale: 1 }));
      }

      await new Promise(r => setTimeout(r, 300)); // wait for layout

      const wrap    = document.getElementById('pdf-wrap');
      const iframeW = wrap.clientWidth || 820;
      const scale   = iframeW / pageDims[0].width;
      const PAGE_GAP = 9; // Chrome PDF viewer gap between pages

      // Set iframe height = full document height (no internal scroll)
      const totalH = pageDims.reduce((sum, vp) => sum + Math.round(vp.height * scale), 0)
                     + PAGE_GAP * (pdf.numPages - 1);
      document.getElementById('pdf-iframe').style.height = totalH + 'px';

      // Compute Y offset for each page (cumulative heights + gaps)
      const pageOffsets = [];
      let cumY = 0;
      for (let i = 0; i < pageDims.length; i++) {
        pageOffsets.push(cumY);
        cumY += Math.round(pageDims[i].height * scale) + PAGE_GAP;
      }

      // Create a marker div for EACH field
      const overlay = document.getElementById('field-overlay');
      overlay.innerHTML = '';
      let firstMarker = null;

      fields.forEach((field, idx) => {
        const offsetY = pageOffsets[field.page] || 0;

        const marker = document.createElement('div');
        marker.className = 'field-marker';
        marker.style.left   = (field.x     * scale) + 'px';
        marker.style.top    = (offsetY + field.y * scale) + 'px';
        marker.style.width  = (field.width  * scale) + 'px';
        marker.style.height = (field.height * scale) + 'px';

        const label = document.createElement('div');
        label.className = 'field-marker-label';
        label.textContent = fields.length > 1
          ? `✍️ שדה חתימה ${idx + 1} (עמוד ${field.page + 1})`
          : '✍️ החתימה שלך כאן';
        marker.appendChild(label);
        overlay.appendChild(marker);

        if (!firstMarker) firstMarker = marker;
      });

      // Scroll to first marker
      if (firstMarker) {
        setTimeout(() => firstMarker.scrollIntoView({ behavior: 'smooth', block: 'center' }), 400);
      }

    } catch (e) {
      console.warn('positionMarkers failed:', e);
      document.getElementById('pdf-iframe').style.height = '600px';
    }
  }

  function initSigPad() {
    const canvas = document.getElementById('signature-canvas');
    canvas.width = canvas.offsetWidth || 700;
    canvas.height = 180;
    sigPad = new SignaturePad(canvas, { backgroundColor: 'rgba(0,0,0,0)', penColor: '#1e293b' });
  }

  function clearSig() { sigPad.clear(); }

  async function submitSignature() {
    if (sigPad.isEmpty()) { alert('אנא חתום לפני האישור'); return; }
    if (!document.getElementById('agree-check').checked) { alert('יש לאשר את ההסכמה לפני החתימה'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'שולח...';

    try {
      const r = await fetch('/api/sign/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, signatureImage: sigPad.toDataURL('image/png') }),
      });
      const data = await r.json();
      if (!r.ok) { alert(data.error || 'שגיאה בשליחה'); btn.disabled = false; btn.textContent = '✅ אשר חתימה ושלח'; return; }

      document.getElementById('main-screen').classList.add('hidden');
      document.getElementById('success-screen').classList.remove('hidden');
      document.getElementById('success-msg').textContent = data.status === 'complete'
        ? 'כל החותמים השלימו — המסמך הסופי נוצר!'
        : 'החתימה שלך נשמרה בהצלחה!';
    } catch (e) {
      alert('שגיאה: ' + e.message);
      btn.disabled = false;
      btn.textContent = '✅ אשר חתימה ושלח';
    }
  }

  function showError(title, msg) {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('error-screen').classList.remove('hidden');
    document.getElementById('error-title').textContent = title;
    document.getElementById('error-msg').textContent = msg;
  }

  init();
</script>
</body>
</html>
