<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חתימה דיגיטלית</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f1f5f9; color: #1e293b; }

  .header { background: #2563eb; color: white; padding: 16px 24px; text-align: center; }
  .header h1 { font-size: 20px; }
  .header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }

  .content { max-width: 800px; margin: 24px auto; padding: 0 16px; }

  .panel { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

  .info-row { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .badge { background: #dbeafe; color: #1d4ed8; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; }

  #pdf-wrapper { overflow-x: auto; }
  #pdf-canvas { display: block; max-width: 100%; border: 1px solid #e2e8f0; border-radius: 4px; }

  .page-nav { display: flex; gap: 8px; align-items: center; margin: 12px 0; }
  .page-nav button { padding: 6px 14px; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; background: white; }

  .sig-panel { margin-top: 20px; }
  .sig-panel h3 { margin-bottom: 12px; }
  .sig-area { border: 2px solid #cbd5e1; border-radius: 8px; position: relative; background: white; touch-action: none; }
  #signature-canvas { display: block; width: 100%; height: 180px; }
  .sig-actions { display: flex; gap: 8px; margin-top: 8px; }

  .btn { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
  .btn:hover { background: #1d4ed8; }
  .btn:disabled { background: #94a3b8; cursor: not-allowed; }
  .btn-outline { background: white; color: #64748b; border: 1px solid #cbd5e1; }
  .btn-green { background: #16a34a; }
  .btn-green:hover { background: #15803d; }

  .loading { text-align: center; padding: 60px; }
  .loading .spinner { width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .success-screen { text-align: center; padding: 60px 24px; }
  .success-screen .icon { font-size: 80px; margin-bottom: 16px; }
  .success-screen h2 { font-size: 24px; margin-bottom: 8px; }
  .success-screen p { color: #64748b; }

  .error-screen { text-align: center; padding: 60px 24px; }
  .error-screen .icon { font-size: 64px; margin-bottom: 16px; }

  .hidden { display: none !important; }
  .hint { color: #64748b; font-size: 13px; margin-top: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>📄 חתימה דיגיטלית</h1>
  <p id="header-sub">טוען מסמך...</p>
</div>

<div class="content">

  <!-- Loading -->
  <div class="loading" id="loading-screen">
    <div class="spinner"></div>
    <p>טוען מסמך...</p>
  </div>

  <!-- Error -->
  <div class="error-screen hidden" id="error-screen">
    <div class="icon">⚠️</div>
    <h2 id="error-title">שגיאה</h2>
    <p id="error-msg"></p>
  </div>

  <!-- Main -->
  <div class="hidden" id="main-screen">
    <div class="panel">
      <div class="info-row">
        <span class="badge" id="signer-badge">חותם</span>
        <span id="signer-name-display"></span>
        <span style="color:#64748b;font-size:14px">| מסמך: <strong id="doc-name-display"></strong></span>
      </div>
      <p style="font-size:14px;color:#64748b;margin-bottom:16px">עיין במסמך ולאחר מכן חתום בתיבה למטה</p>

      <div class="page-nav">
        <button onclick="changePage(-1)">◀ הקודם</button>
        <span id="page-info">עמוד 1</span>
        <button onclick="changePage(1)">הבא ▶</button>
      </div>
      <div id="pdf-wrapper">
        <canvas id="pdf-canvas"></canvas>
      </div>
    </div>

    <div class="panel sig-panel">
      <h3>✍️ חתימתך</h3>
      <p class="hint" style="margin-bottom:10px">חתום בתיבה למטה באמצעות האצבע או עכבר</p>
      <div class="sig-area">
        <canvas id="signature-canvas"></canvas>
      </div>
      <div class="sig-actions">
        <button class="btn btn-outline" onclick="clearSig()">מחק חתימה</button>
      </div>

      <div style="margin-top:20px;padding-top:16px;border-top:1px solid #e2e8f0">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px">
          <input type="checkbox" id="agree-check" style="width:18px;height:18px">
          <span>אני מאשר/ת שקראתי את המסמך ומסכים/ה לחתום עליו דיגיטלית</span>
        </label>
        <button class="btn btn-green" style="margin-top:16px;width:100%;font-size:18px" id="submit-btn" onclick="submitSignature()">
          ✅ אשר חתימה ושלח
        </button>
        <p class="hint" style="text-align:center;margin-top:8px">החתימה תישמר בצורה מאובטחת</p>
      </div>
    </div>
  </div>

  <!-- Success -->
  <div class="success-screen hidden" id="success-screen">
    <div class="icon">✅</div>
    <h2>תודה! החתמת בהצלחה</h2>
    <p id="success-msg">החתימה שלך נשמרה.</p>
    <p style="margin-top:12px;color:#94a3b8;font-size:13px">ניתן לסגור חלון זה</p>
  </div>

</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const token = new URLSearchParams(window.location.search).get('token');
  let pdfDoc = null;
  let currentPage = 1;
  let sigPad = null;

  async function init() {
    if (!token) { showError('לינק לא תקין', 'חסר קוד אימות בקישור'); return; }

    try {
      const r = await fetch(`/api/sign/info?token=${token}`);
      const data = await r.json();

      if (!r.ok) { showError('שגיאה', data.error); return; }

      document.getElementById('header-sub').textContent = `${data.docName} — ${data.signerName}`;
      document.getElementById('signer-name-display').textContent = data.signerName;
      document.getElementById('doc-name-display').textContent = data.docName;

      pdfDoc = await pdfjsLib.getDocument(data.pdfUrl).promise;
      await renderPage(1);

      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('main-screen').classList.remove('hidden');

      initSignaturePad();
    } catch (e) {
      showError('שגיאה בטעינה', e.message);
    }
  }

  async function renderPage(n) {
    const page = await pdfDoc.getPage(n);
    const canvas = document.getElementById('pdf-canvas');
    const maxW = canvas.parentElement.clientWidth || 700;
    const viewport = page.getViewport({ scale: 1 });
    const scale = Math.min(maxW / viewport.width, 1.5);
    const scaled = page.getViewport({ scale });
    canvas.width = scaled.width;
    canvas.height = scaled.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: scaled }).promise;
    currentPage = n;
    document.getElementById('page-info').textContent = `עמוד ${n} מתוך ${pdfDoc.numPages}`;
  }

  function changePage(dir) {
    const next = currentPage + dir;
    if (!pdfDoc || next < 1 || next > pdfDoc.numPages) return;
    renderPage(next);
  }

  function initSignaturePad() {
    const canvas = document.getElementById('signature-canvas');
    canvas.width = canvas.offsetWidth;
    canvas.height = 180;
    sigPad = new SignaturePad(canvas, { backgroundColor: 'rgb(255,255,255)', penColor: '#1e293b' });
  }

  function clearSig() { sigPad.clear(); }

  async function submitSignature() {
    if (sigPad.isEmpty()) { alert('אנא חתום לפני האישור'); return; }
    if (!document.getElementById('agree-check').checked) { alert('יש לאשר את ההסכמה לפני החתימה'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'שולח...';

    try {
      const signatureImage = sigPad.toDataURL('image/png');
      const r = await fetch('/api/sign/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, signatureImage }),
      });
      const data = await r.json();

      if (!r.ok) { alert(data.error || 'שגיאה בשליחה'); btn.disabled = false; btn.textContent = '✅ אשר חתימה ושלח'; return; }

      document.getElementById('main-screen').classList.add('hidden');
      document.getElementById('success-screen').classList.remove('hidden');

      if (data.status === 'complete') {
        document.getElementById('success-msg').textContent = 'כל החותמים השלימו — המסמך הסופי נשלח לסוכן.';
      } else {
        document.getElementById('success-msg').textContent = `החתימה שלך נשמרה. הלינק נשלח ל${data.nextSignerName}.`;
      }
    } catch (e) {
      alert('שגיאה: ' + e.message);
      btn.disabled = false;
      btn.textContent = '✅ אשר חתימה ושלח';
    }
  }

  function showError(title, msg) {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('error-screen').classList.remove('hidden');
    document.getElementById('error-title').textContent = title;
    document.getElementById('error-msg').textContent = msg;
  }

  init();
</script>
</body>
</html>
